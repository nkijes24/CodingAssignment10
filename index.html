<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bear Ninja Hunter Revisited</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main>

        <h1>Bear Ninja Hunter Revisited</h1>

        <div id="rulesSection" class="rules-section">

            <h2>Winning Conditions</h2>

            <ul>
                <li>Bear beats Ninja</li>
                <li>Ninja beats Hunter</li>
                <li>Hunter beats Bear</li>
            </ul>

            <hr>

            <div class="button-container">
                <button id="bearButton">Bear</button>
                <button id="ninjaButton">Ninja</button>
                <button id="hunterButton">Hunter</button>
            </div>

            <hr>

        </div>

        <div id="resultsSection"
             class="results-section hidden"
             aria-live="polite">

            <div id="resultsBox"></div>

            <button id="playAgainButton">Play Again</button>

        </div>

    </main>

    <script src="js/script.js"></script>

</body>
</html>
